<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fix Your Chinese</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 0;
        background: #fff;
        color: #1a1a1a;
        line-height: 1.6;
      }
      .container {
        max-width: 640px;
        margin: 0 auto;
        padding: 80px 24px;
      }
      header {
        text-align: center;
        margin-bottom: 48px;
      }
      h1 {
        font-size: 32px;
        font-weight: 700;
        margin: 0 0 8px;
        letter-spacing: -0.5px;
      }
      .subtitle {
        color: #666;
        font-size: 15px;
        margin: 0;
      }
      .input-area {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 32px;
      }
      textarea {
        width: 100%;
        height: 120px;
        padding: 16px;
        font-size: 16px;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        background: #fafafa;
        resize: none;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
      }
      textarea:focus {
        border-color: #1a1a1a;
        background: #fff;
      }
      button {
        padding: 14px 24px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        background: #1a1a1a;
        color: #fff;
        cursor: pointer;
        align-self: flex-start;
        transition: background 0.2s, transform 0.1s;
      }
      button:hover {
        background: #333;
      }
      button:active {
        transform: scale(0.98);
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      /* Result card */
      .result {
        display: none;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 16px;
        padding: 28px;
        margin-bottom: 40px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      }
      .result.visible {
        display: block;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .result-section {
        margin-bottom: 20px;
      }
      .result-section:last-child {
        margin-bottom: 0;
      }
      .result-label {
        font-size: 12px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .result-value {
        font-size: 17px;
        color: #1a1a1a;
      }
      .result-value.correction {
        font-size: 20px;
        font-weight: 600;
        color: #0d7377;
      }
      .alternatives {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .alt-item {
        padding: 10px 14px;
        background: #f5f5f5;
        border-radius: 8px;
        font-size: 15px;
        color: #333;
      }
      .hsk-badge {
        display: inline-block;
        padding: 4px 12px;
        background: #1a1a1a;
        color: #fff;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
      }

      /* Example hint */
      .hint {
        text-align: center;
        color: #999;
        font-size: 13px;
        margin-top: 8px;
      }
      .hint kbd {
        font-family: inherit;
        background: #f0f0f0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        color: #555;
      }

      /* Footer */
      footer {
        text-align: center;
        margin-top: 60px;
        padding-top: 24px;
        border-top: 1px solid #f0f0f0;
      }
      footer p {
        font-size: 13px;
        color: #aaa;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Fix Your Chinese</h1>
        <p class="subtitle" id="subtitle">Get instant corrections and clear explanations</p>
      </header>

      <div class="input-area">
        <textarea
          id="input"
          placeholder="Paste your Chinese sentence here..."
        ></textarea>
        <button id="submitBtn" onclick="submitText()">Check sentence</button>
      </div>

      <div id="result" class="result">
        <div class="result-section">
          <div class="result-label" id="rl-correction">Correction</div>
          <div id="r-correction" class="result-value correction"></div>
        </div>
        <div class="result-section">
          <div class="result-label" id="rl-explanation">Explanation</div>
          <div id="r-explanation" class="result-value"></div>
        </div>
        <div class="result-section">
          <div class="result-label" id="rl-natural">More natural</div>
          <div id="r-natural" class="alternatives"></div>
        </div>
        <div class="result-section">
          <div class="result-label" id="rl-hsk">HSK Level</div>
          <span id="r-hsk" class="hsk-badge"></span>
        </div>
      </div>

      <footer>
        <p id="footer-text">No signup required &middot; Designed for Chinese learners</p>
      </footer>
    </div>

    <script>
      const i18n = {
        en: {
          title: "Fix Your Chinese",
          subtitle: "Get instant corrections and clear explanations",
          placeholder: "Paste your Chinese sentence here...",
          btnCheck: "Check sentence",
          btnChecking: "Checking...",
          labelCorrection: "Correction",
          labelExplanation: "Explanation",
          labelNatural: "More natural",
          labelHsk: "HSK Level",
          footer: "No signup required · Designed for Chinese learners",
          errorGeneric: "Something went wrong. Please try again."
        },
        vi: {
          title: "Sửa Câu Tiếng Trung Củ Bạn",
          subtitle: "Nhận sửa lỗi ngay và giải thích rõ ràng",
          placeholder: "Dán câu tiếng Trung của bạn vào đây...",
          btnCheck: "Kiểm tra câu",
          btnChecking: "Đang kiểm tra...",
          labelCorrection: "Sửa lại",
          labelExplanation: "Giải thích",
          labelNatural: "Tự nhiên hơn",
          labelHsk: "Cấp độ HSK",
          footer: "Không cần đăng ký · Dành cho ngườ học tiếng Trung",
          errorGeneric: "Đã có lỗi xảy ra. Vui lòng thử lại."
        }
      };

      function detectLang() {
        const params = new URLSearchParams(window.location.search);
        const paramLang = params.get("lang");
        if (paramLang === "vi" || paramLang === "en") return paramLang;

        const browserLang = navigator.language || navigator.userLanguage || "";
        if (browserLang.toLowerCase().startsWith("vi")) return "vi";

        try {
          const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
          if (["Asia/Ho_Chi_Minh", "Asia/Hanoi", "Asia/Saigon"].includes(tz)) return "vi";
        } catch (e) {}

        return "en";
      }

      const lang = detectLang();
      const t = i18n[lang];

      document.documentElement.lang = lang;
      document.title = t.title;
      document.querySelector("h1").textContent = t.title;
      document.getElementById("subtitle").textContent = t.subtitle;
      document.getElementById("rl-correction").textContent = t.labelCorrection;
      document.getElementById("rl-explanation").textContent = t.labelExplanation;
      document.getElementById("rl-natural").textContent = t.labelNatural;
      document.getElementById("rl-hsk").textContent = t.labelHsk;
      document.getElementById("footer-text").textContent = t.footer;

      const input = document.getElementById("input");
      input.placeholder = t.placeholder;
      const btn = document.getElementById("submitBtn");
      btn.textContent = t.btnCheck;
      const result = document.getElementById("result");

      input.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          submitText();
        }
      });

      async function submitText() {
        const text = input.value.trim();
        if (!text) {
          input.focus();
          return;
        }

        btn.disabled = true;
        btn.textContent = t.btnChecking;
        result.classList.remove("visible");

        try {
          const res = await fetch("/api/correct", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, lang }),
          });
          const data = await res.json();

          document.getElementById("r-correction").textContent = data.correction;
          document.getElementById("r-explanation").textContent = data.explanation;

          const naturalContainer = document.getElementById("r-natural");
          naturalContainer.innerHTML = data.natural
            .map((s) => `<div class="alt-item">${s}</div>`)
            .join("");

          document.getElementById("r-hsk").textContent = `Level ${data.hsk_level}`;

          result.classList.add("visible");
          result.scrollIntoView({ behavior: "smooth", block: "nearest" });
        } catch (err) {
          alert(t.errorGeneric);
        } finally {
          btn.disabled = false;
          btn.textContent = t.btnCheck;
        }
      }
    </script>
  </body>
</html>
